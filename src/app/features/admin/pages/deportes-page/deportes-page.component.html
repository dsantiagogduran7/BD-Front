<div class="page-header">
  <div class="header-left">
    <h1>Deportes</h1>
    <span class="total-badge">{{ deportesFiltrados.length }} registros</span>
  </div>
  <button class="btn-primary" (click)="nuevoDeporte()">
    <span class="icon">+</span> Nuevo Deporte
  </button>
</div>

<!-- Filtro -->
<div class="filtros-bar">
  <div class="search-wrapper">
    <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input
      type="text"
      placeholder="Buscar por nombre o descripción..."
      [(ngModel)]="busqueda"
      class="search-input"
    />
  </div>
</div>

<!-- Tabla -->
<div class="table-wrapper">
  <table class="data-table">
    <thead>
      <tr>
        <th>Deporte</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of deportesPaginados" class="table-row">
        <td>
          <div class="member-cell">
            <div class="avatar">{{ d.nombre[0] }}</div>
            <span class="member-name">{{ d.nombre }}</span>
          </div>
        </td>
        <td class="desc-cell">{{ d.descripcion }}</td>
        <td>
          <button class="btn-icon" (click)="abrirDetalle(d)" title="Ver detalle"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </td>
      </tr>
      <tr *ngIf="deportesFiltrados.length === 0">
        <td colspan="3" class="empty-row">No se encontraron deportes.</td>
      </tr>
    </tbody>
  </table>
  <app-paginacion
    [totalPaginas]="totalPaginas"
    [paginaActual]="paginaActual"
    (cambiarPagina)="cambiarPagina($event)"
  ></app-paginacion>
</div>

<!-- Modal detalle / edición -->
<div class="modal-overlay" *ngIf="mostrarModal" (click)="cerrarModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ modoEdicion ? (esNuevo ? 'Nuevo Deporte' : 'Editar Deporte') : 'Detalle del Deporte' }}</h2>
      <button class="btn-close" (click)="cerrarModal()">&#x2715;</button>
    </div>

    <div class="modal-body" *ngIf="deporteSeleccionado">
      <div class="form-section">
        <h3 class="section-title">Información</h3>
        <div class="form-grid cols-1">

          <div class="form-group">
            <label>Nombre</label>
            <input type="text" [(ngModel)]="deporteSeleccionado.nombre" [disabled]="!modoEdicion" maxlength="20" />
          </div>

          <div class="form-group">
            <label>Descripción</label>
            <textarea [(ngModel)]="deporteSeleccionado.descripcion" [disabled]="!modoEdicion" maxlength="100"></textarea>
          </div>

        </div>
      </div>
    </div>

    <div class="error-validacion" *ngIf="errorValidacion">{{ errorValidacion }}</div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="cerrarModal()">Cancelar</button>
      <button *ngIf="!modoEdicion" class="btn-danger" (click)="eliminar(deporteSeleccionado!.id_deporte)">Eliminar</button>
      <button *ngIf="!modoEdicion" class="btn-primary" (click)="modoEdicion = true">Editar</button>
      <button *ngIf="modoEdicion" class="btn-primary" (click)="guardar()">Guardar</button>
    </div>
  </div>
</div>
