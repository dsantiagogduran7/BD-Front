<div class="register-container">
  <div class="register-card">

    <!-- Header -->
    <div class="register-header">
      <div class="logo-circle">UB</div>
      <h1>UB-Deporte</h1>
      <p class="subtitle">Crea tu cuenta de miembro</p>
    </div>

    <!-- Error -->
    <div class="error-banner" *ngIf="error">
      <span>⚠️</span> {{ error }}
    </div>

    <form (ngSubmit)="registrar()">

        <div class="section-title">Datos Personales</div>
        <div class="form-grid">

          <div class="form-group">
            <label>Cédula *</label>
            <input type="text" placeholder="Número de cédula" [(ngModel)]="form.cedula" name="cedula" />
          </div>

          <div class="form-group">
            <label>Fecha de Nacimiento *</label>
            <input type="date" [(ngModel)]="form.fecha_nacimiento" name="fecha_nacimiento" [max]="maxFechaNacimiento" />
          </div>

          <div class="form-group">
            <label>Primer Nombre *</label>
            <input type="text" placeholder="Primer nombre" [(ngModel)]="form.primer_nombre" name="primer_nombre" />
          </div>

          <div class="form-group">
            <label>Segundo Nombre</label>
            <input type="text" placeholder="Segundo nombre (opcional)" [(ngModel)]="form.segundo_nombre" name="segundo_nombre" />
          </div>

          <div class="form-group">
            <label>Primer Apellido *</label>
            <input type="text" placeholder="Primer apellido" [(ngModel)]="form.primer_apellido" name="primer_apellido" />
          </div>

          <div class="form-group">
            <label>Segundo Apellido *</label>
            <input type="text" placeholder="Segundo apellido" [(ngModel)]="form.segundo_apellido" name="segundo_apellido" />
          </div>

          <div class="form-group">
            <label>Correo electrónico *</label>
            <input type="email" placeholder="tucorreo@ejemplo.com" [(ngModel)]="form.correo" name="correo" />
          </div>

          <div class="form-group">
            <label>Teléfono *</label>
            <input type="text" placeholder="Número de teléfono" [(ngModel)]="form.telefono" name="telefono" />
          </div>

          <div class="form-group">
            <label>Contraseña *</label>
            <input type="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="form.password" name="password" />
          </div>

          <div class="form-group">
            <label>Confirmar Contraseña *</label>
            <input type="password" placeholder="Repite la contraseña" [(ngModel)]="form.confirmar_password" name="confirmar_password" />
          </div>

        </div>

        <div class="section-title">Datos Físicos</div>
        <div class="form-grid cols-3">

          <div class="form-group">
            <label>Altura (cm) *</label>
            <input type="number" placeholder="Ej: 170" [(ngModel)]="form.altura" name="altura" min="50" max="250" />
          </div>

          <div class="form-group">
            <label>Peso actual (kg) *</label>
            <input type="number" placeholder="Ej: 70.5" step="0.01" [(ngModel)]="form.peso_actual" name="peso_actual" min="20" max="300" />
          </div>

          <div class="form-group">
            <label>Nivel de Experiencia *</label>
            <select [(ngModel)]="form.nivel_experiencia" name="nivel_experiencia">
              <option value="novato">Novato</option>
              <option value="avanzado">Avanzado</option>
              <option value="profesional">Profesional</option>
            </select>
          </div>

        </div>

        <button type="submit" class="register-btn" [disabled]="cargando">
          <span *ngIf="!cargando">Crear cuenta</span>
          <span *ngIf="cargando">Registrando...</span>
        </button>

        <p class="login-link">
          ¿Ya tienes cuenta?
          <a (click)="irLogin()">Inicia sesión</a>
        </p>

      </form>

  </div>
</div>
