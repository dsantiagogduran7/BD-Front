<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="logo-circle">UB</div>
      <h1>UB-Deporte</h1>
      <p class="subtitle">Inicia sesión para continuar</p>
    </div>

    <div class="error-banner" *ngIf="errorMensaje">
      <span>⚠️</span> {{ errorMensaje }}
    </div>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" placeholder="tucorreo@ejemplo.com" [(ngModel)]="correo" [class.input-error]="errorMensaje" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="password-wrapper">
        <input [type]="mostrarPassword ? 'text' : 'password'" placeholder="••••••••" [(ngModel)]="password" [class.input-error]="errorMensaje" />
        <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword" tabindex="-1">
          {{ mostrarPassword ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>Ingresar como</label>
      <div class="rol-grid">
        <button type="button" class="rol-btn" [class.rol-activo]="rol === 'administrador'" (click)="rol = 'administrador'">🛡️ Admin</button>
        <button type="button" class="rol-btn" [class.rol-activo]="rol === 'entrenador'"    (click)="rol = 'entrenador'">🏋️ Entrenador</button>
        <button type="button" class="rol-btn" [class.rol-activo]="rol === 'miembro'"       (click)="rol = 'miembro'">🧍 Miembro</button>
        <button type="button" class="rol-btn" [class.rol-activo]="rol === 'operador'"      (click)="rol = 'operador'">🔧 Operador</button>
      </div>
    </div>

    <button class="login-btn" (click)="iniciarSesion()" [disabled]="cargando">
      <span *ngIf="!cargando">Entrar</span>
      <span *ngIf="cargando">⏳ Verificando...</span>
    </button>

    <div class="hint-box">
      <p class="hint-title">Credenciales de prueba</p>
      <div class="hint-grid">
        <div class="hint-item">
          <span class="hint-rol">Admin</span>
          <span>admin&#64;ubdeporte.com / admin123</span>
        </div>
        <div class="hint-item">
          <span class="hint-rol">Entrenador</span>
          <span>jorge.ramirez&#64;ubdeporte.com / jorge123</span>
        </div>
        <div class="hint-item">
          <span class="hint-rol">Miembro</span>
          <span>carlos.rodriguez&#64;email.com / carlos123</span>
        </div>
        <div class="hint-item">
          <span class="hint-rol">Operador</span>
          <span>operador&#64;ubdeporte.com / operador123</span>
        </div>
      </div>
    </div>

  </div>
</div>
